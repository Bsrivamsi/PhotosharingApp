spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB

photos.storage.location=uploads
photos.thumbnail.location=uploads/thumbnails
profiles.storage.location=uploads/profiles

app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

server.port=${PORT:${SERVER_PORT:8080}}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
