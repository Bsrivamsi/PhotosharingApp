services:
  - type: web
    name: phototribe-backend
    env: java
    rootDir: backend
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: mvn spring-boot:run -Dspring-boot.run.profiles=dev
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: dev
      - key: APP_CORS_ALLOWED_ORIGIN_PATTERNS
        value: https://your-netlify-site.netlify.app